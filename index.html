<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="manifest" href="manifest.json" />
  <title>Scanner App</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 16px; }
    input, button { font-size: 18px; padding: 12px; }
    #scanner { display:none; position:fixed; inset:0; background:#000; }
    #video { width: 100%; height: 70vh; object-fit: cover; }
    .card { padding: 12px; border: 1px solid #ddd; border-radius: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <h2 id="title"></h2>

  <div class="card">
    <input id="studentId" placeholder="Scan or enter Student ID" autocomplete="off" />
    <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
      <button id="lookupBtn">Submit</button>
      <button id="scanBtn">Scan with Camera</button>
    </div>
  </div>

  <div class="card">
    <div><b>Name:</b> <span id="name">-</span></div>
    <div><b>Class Year:</b> <span id="year">-</span></div>
    <div><b>Team:</b> <span id="team">-</span></div>
    <div style="margin-top:10px;"><b>Total:</b> <span id="count">-</span></div>
    <div id="status" style="margin-top:10px;"></div>
    <button id="emailBtn" style="margin-top:10px; display:none;">Email Home</button>
  </div>

  <div id="scanner">
    <video id="video" playsinline></video>
    <div style="padding:12px; display:flex; gap:10px;">
      <button id="closeScan">Close</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lanyard App</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        margin: 16px;
      }

      #card {
        border: 3px solid #ccc;
        border-radius: 16px;
        padding: 14px;
        margin-top: 12px;
      }

      .tierGlow {
        box-shadow: 0 0 18px rgba(0,0,0,0.2);
      }

      #row {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      #studentId {
        flex: 1;
        font-size: 20px;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid #ccc;
      }

      #lookupBtn {
        font-size: 20px;
        padding: 14px 18px;
        border-radius: 12px;
        border: 1px solid #ccc;
        background: #f2f2f2;
      }

      #status {
        margin-top: 10px;
        min-height: 22px;
      }

      /* Scanner area */
      #scanner {
        position: relative;
        width: 100%;
        height: 360px;
        margin-top: 14px;
        border-radius: 18px;
        overflow: hidden;
        background: black;
      }

      /* Quagga inserts video/canvas inside #scanner */
      #scanner video,
      #scanner canvas {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Overlay label */
      #guide {
        position: absolute;
        top: 14px;
        left: 0;
        right: 0;
        text-align: center;
        z-index: 10;
        color: #ddd;
        font-size: 16px;
        text-shadow: 0 1px 2px rgba(0,0,0,0.6);
        pointer-events: none;
      }

      /* White aim box */
      #guideBox {
        position: absolute;
        left: 10%;
        right: 10%;
        top: 35%;
        bottom: 35%;
        border: 4px solid white;
        border-radius: 18px;
        z-index: 10;
        pointer-events: none;
      }

      #btnRow {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 14px;
      }

      #scanBtn, #scanOnceBtn, #closeScan {
        font-size: 20px;
        padding: 14px 18px;
        border-radius: 14px;
        border: 1px solid #ccc;
        background: #f2f2f2;
        min-width: 140px;
      }
    </style>
  </head>

  <body>
    <h1 id="title">Loading...</h1>

    <div id="row">
      <input id="studentId" placeholder="Scan or enter Student ID" inputmode="numeric" />
      <button id="lookupBtn">Submit</button>
    </div>

    <div id="status"></div>

    <div id="card">
      <div><b>Name:</b> <span id="name">-</span></div>
      <div><b>Class Year:</b> <span id="year">-</span></div>
      <div><b>Team:</b> <span id="team">-</span></div>
      <div><b>Total:</b> <span id="count">-</span></div>
    </div>

    <!-- Camera Preview Container (Quagga will inject <video> here) -->
    <div id="scanner">
      <div id="guide">Place barcode inside the box</div>
      <div id="guideBox"></div>
    </div>

    <div id="btnRow">
      <button id="scanBtn">Start Camera</button>
      <button id="scanOnceBtn">Scan Now</button>
      <button id="closeScan">Stop</button>
    </div>

    <!-- Config FIRST -->
    <script src="./config.js?v=12001"></script>

    <!-- Quagga2 library -->
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

    <!-- App -->
    <script type="module" src="./scanner_v1.js?v=12001"></script>
  </body>
</html>

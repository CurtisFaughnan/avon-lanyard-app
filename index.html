<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lanyard App</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#fff; }
    #app {
      height: 100vh;
      display: grid;
      grid-template-rows: 48vh 52vh; /* top UI / bottom camera */
    }

    /* TOP */
    #top {
      padding: 14px;
      box-sizing: border-box;
      border-bottom: 1px solid #ddd;
      display:flex;
      flex-direction: column;
      gap: 10px;
    }

    #title { margin:0; font-size: 28px; }
    #status { margin:0; min-height: 22px; font-size: 16px; }

    .row { display:flex; gap:10px; }
    input, button {
      font-size: 20px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #bbb;
      box-sizing: border-box;
    }
    input { flex: 1; }
    button { width: 160px; }

    #card {
      border: 2px solid #ccc;
      border-radius: 14px;
      padding: 12px;
      font-size: 18px;
    }
    #card b { display:inline-block; width: 110px; }

    /* BOTTOM CAMERA */
    #bottom {
      position: relative;
      background: #000;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Scan guide overlay box */
    #guide {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 80%;
      max-width: 520px;
      height: 120px;
      transform: translate(-50%, -50%);
      border: 4px solid rgba(255,255,255,0.9);
      border-radius: 16px;
      box-shadow: 0 0 0 4000px rgba(0,0,0,0.35);
      pointer-events: none;
    }

    #guideLabel {
      position: absolute;
      left: 50%;
      top: calc(50% - 90px);
      transform: translateX(-50%);
      color: #fff;
      background: rgba(0,0,0,0.55);
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 16px;
      pointer-events: none;
    }

    /* Controls over camera */
    #camControls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 12px;
      box-sizing: border-box;
    }
    #camControls button {
      width: auto;
      min-width: 160px;
      border: none;
    }
    #scanBtn { background:#fff; }
    #closeScan { background:#ffefef; }

    /* Tier highlight */
    .tierGlow {
      box-shadow: 0 0 0 6px rgba(0,0,0,0.06);
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- TOP UI -->
    <div id="top">
      <h2 id="title">Loading...</h2>

      <div class="row">
        <input id="studentId" placeholder="Scan or enter Student ID" inputmode="numeric" />
        <button id="lookupBtn">Submit</button>
      </div>

      <p id="status"></p>

      <div id="card">
        <div><b>Name:</b> <span id="name">-</span></div>
        <div><b>Class Year:</b> <span id="year">-</span></div>
        <div><b>Team:</b> <span id="team">-</span></div>
        <div style="margin-top:8px;"><b>Total:</b> <span id="count">-</span></div>
      </div>
    </div>

    <!-- BOTTOM CAMERA (always visible) -->
    <div id="bottom">
      <video id="video" autoplay playsinline muted></video>

      <div id="guideLabel">Place barcode inside the box</div>
      <div id="guide"></div>

      <div id="camControls">
        <button id="scanBtn">Start Camera</button>
        <button id="closeScan">Stop</button>
      </div>
    </div>
  </div>

  <!-- Load config first, then module -->
  <script src="./config.js?v=1006"></script>
  <script type="module" src="./scanner_v1.js?v=1006"></script>
</body>
</html>
